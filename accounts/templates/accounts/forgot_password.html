{% load static %}
<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>استعادة كلمة المرور</title>
    <link rel="stylesheet" href="/static/css/forgot_password.css">
</head>
<body>

    <div class="forgot-container">
        <div class="icon-box">
            <i class="fa-solid fa-lock-open"></i>
        </div>
        
        <h2>نسيت كلمة المرور؟</h2>
        <p>أدخل بريدك الإلكتروني المسجل وسنقوم بإرسال رمز تحقق مكوّن من 6 أرقام.</p>

        {% if messages %}
            {% for message in messages %}
                <div class="alert-message">
                    <i class="fa-solid fa-triangle-exclamation"></i> {{ message }}
                </div>
            {% endfor %}
        {% endif %}

        <form action="/accounts/forgot-password/" method="POST">
            {% csrf_token %}
            <div class="input-group">
                <label>البريد الإلكتروني</label>
                <i class="fa-solid fa-envelope"></i>
                <input type="email" name="email" required placeholder="example@mail.com">
            </div>
            
            <button type="submit">إرسال رمز التفعيل</button>
        </form>

        <a href="/accounts/login/" class="back-to-login">
            <i class="fa-solid fa-arrow-right-to-bracket"></i> العودة لتسجيل الدخول
        </a>
    </div>

    <script src="/static/js/forgot_password.js"></script>
</body>
</html>
